<section class="data-management">
  <div class="section-head">
    <div>
      <span class="section-kicker">Library Archive</span>
      <h2>数据备份与恢复</h2>
      <p>导出当前片库、收藏/已看状态、个人评分、笔记、影评与最近浏览记录；也可以从 JSON 直接恢复。</p>
    </div>
    <div class="section-actions">
      <button mat-stroked-button class="secondary-btn" (click)="openImportPicker()">
        <mat-icon>upload_file</mat-icon>
        导入 JSON
      </button>
      <button mat-flat-button class="primary-btn" (click)="exportJson()">
        <mat-icon>download</mat-icon>
        导出 JSON
      </button>
      <input #fileInput type="file" accept="application/json,.json" hidden (change)="onFileSelected($event)">
    </div>
  </div>

  <div class="summary-grid">
    <mat-card class="summary-card">
      <span class="summary-label">电影条目</span>
      <strong>{{ summary.movieCount }}</strong>
      <p>当前片库总量</p>
    </mat-card>
    <mat-card class="summary-card">
      <span class="summary-label">最近浏览</span>
      <strong>{{ summary.recentHistoryCount }}</strong>
      <p>最近浏览记录</p>
    </mat-card>
    <mat-card class="summary-card">
      <span class="summary-label">影评数据</span>
      <strong>{{ summary.reviewCount }}</strong>
      <p>影评墙与手动录入内容</p>
    </mat-card>
  </div>
</section>
