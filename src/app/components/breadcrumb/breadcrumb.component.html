<nav class="breadcrumb" aria-label="Breadcrumb" *ngIf="items.length > 0">
  <a class="breadcrumb-home" routerLink="/dashboard">首页</a>

  <ng-container *ngFor="let item of items">
    <span class="breadcrumb-separator">/</span>
    <a *ngIf="!item.last; else currentLabel" [routerLink]="item.url">
      {{ item.label }}
    </a>
    <ng-template #currentLabel>
      <span class="is-current">{{ item.label }}</span>
    </ng-template>
  </ng-container>
</nav>
