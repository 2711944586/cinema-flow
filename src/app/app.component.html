<div class="app-shell">
  <header class="app-header">
    <div class="header-top">
      <a class="brand" routerLink="/dashboard">
        <div class="brand-icon">
          <span class="icon-glow"></span>
          <span>CF</span>
        </div>
        <div class="brand-copy">
          <strong>CinemaFlow</strong>
          <span>Private Screening Archive</span>
        </div>
      </a>

      <div class="header-actions">
        <button mat-stroked-button class="command-button" (click)="openCommandPalette()">
          <mat-icon>search</mat-icon>
          <span>快速跳转</span>
          <span class="shortcut">Ctrl / Cmd + K</span>
        </button>

        <button mat-stroked-button class="auth-button" (click)="toggleAuth()">
          <mat-icon>{{ (isAuthenticated$ | async) ? 'lock_open' : 'login' }}</mat-icon>
          <span>{{ (isAuthenticated$ | async) ? '退出编辑' : '进入编辑' }}</span>
        </button>
      </div>
    </div>

    <div class="nav-shell">
      <div class="nav-group">
        <span class="nav-group-label">Core</span>
        <nav class="nav-track">
          <a
            *ngFor="let item of coreNav"
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        </nav>
      </div>

      <div class="nav-group nav-group-secondary">
        <span class="nav-group-label">Enhancements</span>
        <nav class="nav-track">
          <a
            *ngFor="let item of enhancementNav"
            class="nav-link secondary-link"
            [routerLink]="item.route"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        </nav>
      </div>
    </div>
  </header>

  <div class="breadcrumb-wrap">
    <app-breadcrumb></app-breadcrumb>
  </div>

  <main class="app-content">
    <app-page-jump-bar></app-page-jump-bar>

    <div class="content-grid">
      <section class="content-column">
        <router-outlet></router-outlet>
      </section>

      <aside class="sidebar-column">
        <app-message-panel></app-message-panel>
      </aside>
    </div>
  </main>
</div>
