<section class="movie-add-page">
  <div class="page-head">
    <span class="page-kicker">New Entry</span>
    <h1>添加电影</h1>
    <p>新增电影并校验海报。</p>
  </div>

  <section class="status-card" *ngIf="isSaving || saveError">
    <div class="status-indicator" [class.is-error]="!!saveError">
      <mat-icon>{{ saveError ? 'error' : 'hourglass_top' }}</mat-icon>
    </div>
    <div>
      <h2>{{ saveError ? '本次提交未通过校验' : '正在写入片库' }}</h2>
      <p>{{ saveError || '写入片库并刷新 Movies。' }}</p>
    </div>
  </section>

  <app-movie-form (submitted)="onSubmit($event)" (cancelled)="onCancel()"></app-movie-form>
</section>
